<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal do Aluno - Primeira Marcha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

<div class="container_login text-center">
    <form class="login_filho" onsubmit="return validarLogin()">
        <img src="/img/Adobe Express - file 4.png" alt="logo" class="mt-5">
        <h1 class="fw-bold">Primeira Marcha</h1>
        <h3>A sua jornada começa aqui.</h3>
        
        <div class="mb-3">
            <input type="email" class="form-control w-75 mx-auto" id="inputEmail" placeholder="E-mail" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control w-75 mx-auto" id="inputPassword" placeholder="Senha" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Entrar</button>
        
        <div class="mt-3 fw-bold">
            <a href="/esquecisenha.html">Esqueci a senha</a> | 
            <a href="login.html?abrir=cadastro">cadastra-se</a>
        </div>
    </form>
</div>

<div class="modal fade" id="modalCadastro" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">CADASTRO</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <form onsubmit="return ValidarCadastro()">
            <input type="text" class="form-control mb-2" placeholder="Nome Completo" required>
            <input type="email" class="form-control mb-2" placeholder="E-mail" required>
            <input type="password" class="form-control mb-2" placeholder="Senha" required>
            <input type="password" class="form-control mb-3" placeholder="Confirmar Senha" required>
            <button type="submit" class="btn btn-primary w-100">Confirma</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Lógica para abrir o modal automaticamente
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('abrir') === 'cadastro') {
            const modalElement = document.getElementById('modalCadastro');
            const meuModal = new bootstrap.Modal(modalElement);
            meuModal.show();
        }
    });
</script>
</body>
</html>
