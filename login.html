<!DOCTYPE html>
<html lang="pt-br">

<head>
  <title>Login </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="css/style.css" rel="stylesheet">

</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <div class="container_login ">

    <form class="login_filho " onsubmit="return validarLogin()">

      <div class="login-img mt-5">
        <img src="/img/Adobe Express - file 4.png" alt="logo" class="">
        <div class="titulo_login ">
          <h1 class="fw-bold">Primeira Marcha</h1>
          <h3>A sua jornada começa aqui.</h3>

        </div>
      </div>
      <div class="d-flex titulos_login mb-5">
        <h3 class="text-custom-blue"> PORTAL DO ALUNO</h3>
      </div>
      <div class="row mb-3 email_login  d-md-flex justify-content-center t-3 caixa_email">
        <div class="col-sm-10 " required>

          <input type="email" class="form-control w-75 text-center validarLogin" id="inputEmail3" placeholder="E-mail"
            required>

        </div>

      </div>

      <div class="row  senha_login d-flex g-md-3 justify-content-center caixa_email" required>

        <div class="col-sm-10" required>

          <input type="password" class="form-control w-75 text-center senha mt-3 mb-3 validarLogin" id="inputPassword3"
            style="padding-right: 35px; height: 40px;" placeholder="Senha" required>
        </div>
        <div class="row mb-3 entrar_botao">
          <div class="col-sm-10 move_botao" aria-required="Obrigario preencher">

            <button type="submit" class="btn btn-primary botao_entrar validarLogin">Entra</button>
            <div class="infor_login mt-3 fw-bold ">
              <a href="/esquecisenha.html">Esqueci a senha</a>
              <a href="/cadastro.html" onclick="abrirModalCadastro(event)" target="_self">cadastra-se</a>
            </div>

    </form>
  </div>

  <div><i class="bi bi-person-circle user"></i></div>
  <div><i class="bi bi-lock-fill cadiado"></i>
    <div onclick="click"> <i class="bi bi-eye olho" id="togglePassword"></i></div>

  </div>
  </div>



  <script src="./js/login.js"></script>

  <div class="modal fade" id="modalCadastro" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-content">

 
  
      <div class="modal-body" id="conteudoCadastro">
   
 
        <div class="text-center">Carregando...



  </div>
 
        </div>

      </div>
    </div>
  </div>

<script>
  function abrirModalCadastro(event) {
    // Impede que o link tente mudar de página
    event.preventDefault(); 

    const modalElement = document.getElementById('modalCadastro');
    const modal = new bootstrap.Modal(modalElement);
    modal.show();

    fetch('cadastro.html')
      .then(response => response.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const conteudo = doc.querySelector('.cadastro_main').innerHTML; 
        document.getElementById('conteudoCadastro').innerHTML = conteudo;
      })
      .catch(err => {
        document.getElementById('conteudoCadastro').innerHTML = "<p class='p-3 text-danger'>Erro ao carregar o formulário.</p>";
      });
  }
</script>



</body>

</html>
